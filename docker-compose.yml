name: llm-server

x-gpu: &gpu
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu]

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    volumes:
      - ${DATA_ROOT:-./data}/ollama:/root/.ollama
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_KEEP_ALIVE: 24h
    healthcheck:
      test: ["CMD-SHELL", "OLLAMA_HOST=127.0.0.1:11434 ollama list >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s
    <<: *gpu

  model-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ${DATA_ROOT:-./data}/ollama:/root/.ollama
    environment:
      OLLAMA_HOST: ollama:11434
      MODELS: ${MODELS:-gemma4:e4b}
    entrypoint: /bin/sh
    command:
      - -c
      - |
        for m in $$MODELS; do
          echo "pulling $$m"
          ollama pull "$$m"
        done
    restart: "no"

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: litellm
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ./configs/litellm-config.yaml:/app/config.yaml:ro
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
    command: --config /app/config.yaml --host 0.0.0.0 --port 4000

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    depends_on:
      - litellm
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    volumes:
      - ./configs/Caddyfile:/etc/caddy/Caddyfile:ro
      - ${DATA_ROOT:-./data}/caddy/data:/data
      - ${DATA_ROOT:-./data}/caddy/config:/config
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}

  # Public tunnel via ngrok — optional.
  # Enable by setting NGROK_AUTHTOKEN + NGROK_DOMAIN in .env and
  # COMPOSE_PROFILES=ngrok (or pass `--profile ngrok` to docker compose).
  ngrok:
    image: ngrok/ngrok:latest
    container_name: ngrok
    restart: unless-stopped
    profiles: [ngrok]
    depends_on:
      - caddy
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    command: http --url=${NGROK_DOMAIN} caddy:80
